# ═══════════════════════════════════════════════════════════════════
# OPTIONAL SETTINGS (Not used by main.py but kept for other tools)
# ═══════════════════════════════════════════════════════════════════

# These will be ignored by main.py but might be used by other scripts
template_dir: "~/Library/CloudStorage/Dropbox/Work/Maths/Scripts/templates"
known_authors_file: "~/Library/CloudStorage/Dropbox/Work/Maths/Scripts/known_authors.txt"
enable_spellcheck: true
backup_enabled: true
dry_run_default: true

correction_thresholds:
  author_name_similarity: 95
  title_similarity: 90

max_unpublished_age_years: 5

# Ultra-Enhanced PDF Parser Configuration
# FIXED VERSION - All critical issues addressed

extraction:
  # Basic extraction settings
  max_pages: 10
  timeout_seconds: 45  # FIXED: Ensure timeout is always set
  enable_position_analysis: true
  enable_font_analysis: true
  multi_column_threshold: 0.6
  title_max_lines: 5
  author_max_lines: 4
  fallback_enabled: true
  cache_enabled: true

repositories:
  # Repository-specific parsers
  enable_ssrn_parser: true
  enable_arxiv_parser: true
  enable_nber_parser: true
  enable_journal_parser: true
  enable_pubmed_parser: true
  enable_repec_parser: true

scoring:
  # Confidence scoring weights
  position_weight: 0.25
  font_weight: 0.20
  length_weight: 0.15
  content_weight: 0.40
  confidence_threshold: 0.5

performance:
  # Performance and memory settings
  max_memory_mb: 500
  cache_size: 2000
  parallel_enabled: true
  profiling_enabled: false

engines:
  # Extraction engine settings
  enable_grobid: true
  enable_ocr: true

# Grobid service configuration
grobid:
  url: "http://localhost:8070"
  timeout: 300

# OCR configuration
ocr:
  language: "eng"
  max_pages: 3
  dpi: 200
  tesseract_path: null  # Use system default

# Logging configuration
logging:
  level: "INFO"
  enable_debug: false
  log_file: null

google_scholar:
  use_proxy: true
  proxy_list_file: "~/Dropbox/Work/Maths/Scripts/proxies.txt"

